name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package with dev deps
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Type check
        run: mypy src/
      - name: Test
        run: pytest tests/ -v

  compat-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Check backwards compatibility of changed schemas
        run: |
          python -c "
          import json, subprocess, sys
          from pathlib import Path
          from personal_event_mesh.compat import check_backwards_compatible

          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', 'origin/main...HEAD'],
              text=True
          ).strip().split('\n')

          schema_changes = [f for f in changed if f.startswith('schemas/') and f.endswith('.schema.json')]
          if not schema_changes:
              print('No schema changes detected.')
              sys.exit(0)

          breaking = []
          for schema_file in schema_changes:
              try:
                  old = json.loads(subprocess.check_output(
                      ['git', 'show', f'origin/main:{schema_file}'], text=True
                  ))
              except subprocess.CalledProcessError:
                  print(f'  NEW: {schema_file} (no compat check needed)')
                  continue
              new = json.loads(Path(schema_file).read_text())
              issues = check_backwards_compatible(old, new)
              if issues:
                  breaking.extend([f'{schema_file}: {i}' for i in issues])
              else:
                  print(f'  OK: {schema_file}')

          if breaking:
              print('\nBREAKING CHANGES DETECTED:')
              for b in breaking:
                  print(f'  - {b}')
              sys.exit(1)
          print('\nAll schema changes are backwards-compatible.')
          "
